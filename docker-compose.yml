version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: afripay
      POSTGRES_PASSWORD: afripay
      POSTGRES_DB: afripayxlm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afripay"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://afripay:afripay@postgres:5432/afripayxlm
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}
      STELLAR_RECEIVING_ADDRESS: ${STELLAR_RECEIVING_ADDRESS:-}
      STELLAR_RECEIVING_SECRET: ${STELLAR_RECEIVING_SECRET:-}
      FRONTEND_URL: http://localhost:5173
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
